<div class="logo-box">
    <!-- SVG Vector Graphic -->
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 130" width="100%" max-width="500px">
        <defs>
            <!-- Background & Accent Gradients -->
            <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#1e293b" />
                <stop offset="100%" stop-color="#0f172a" />
            </linearGradient>
            <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#fbbf24" />
                <stop offset="50%" stop-color="#f59e0b" />
                <stop offset="100%" stop-color="#d97706" />
            </linearGradient>
            <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#38bdf8" />
                <stop offset="100%" stop-color="#0369a1" />
            </linearGradient>
            <!-- Glow Filter -->
            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="4" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
        </defs>

        <!-- 1. THE EMBLEM (HEXAGON SHIELD WITH TECH ORBITS) -->
        <!-- Outer Tech Gear/Dots -->
        <circle cx="65" cy="65" r="54" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 6" opacity="0.6" />
        <circle cx="65" cy="65" r="48" fill="none" stroke="#38bdf8" stroke-width="1" stroke-dasharray="20 10" />
        
        <!-- Main Hexagon Shield Base -->
        <polygon points="65,18 104,40 104,85 65,108 26,85 26,40" fill="url(#shieldGrad)" stroke="url(#goldGrad)" stroke-width="3" filter="url(#glow)"/>
        
        <!-- Inner Dynamic Tech Line (Cyber Accent) -->
        <path d="M 35,45 L 65,28 L 95,45 L 95,80" fill="none" stroke="url(#cyanGrad)" stroke-width="2" opacity="0.8" />

        <!-- Bold Stylized Letter 'T' inside the Shield -->
        <path d="M 45,45 L 85,45 M 65,45 L 65,88" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
        <!-- Gold Dot on T (Represents Digital Signal/Accuracy) -->
        <circle cx="65" cy="45" r="4" fill="url(#goldGrad)" />

        <!-- 2. TYPOGRAPHY (BRAND NAME) -->
        <!-- TAQWA - Main Bold Title -->
        <text x="135" y="65" font-family="'Montserrat', 'Segoe UI', Arial, sans-serif" font-size="46" font-weight="900" fill="#ffffff" letter-spacing="4">TAQWA</text>
        
        <!-- ONLINE SERVICES - Subtitle with High Letter Spacing -->
        <text x="137" y="94" font-family="'Open Sans', 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="url(#goldGrad)" letter-spacing="7.5">ONLINE SERVICES</text>
        
        <!-- Small Decorative Tech Line Under the Text -->
        <line x1="137" y1="108" x2="440" y2="108" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" opacity="0.5" />
        <circle cx="440" cy="108" r="2.5" fill="#38bdf8" />
    </svg>
</div>

<style>
    /* Styling to make it look extremely premium on your screen */
    .logo-box {
        background: #0b1329; /* Dark Luxury Background */
        padding: 30px;
        border-radius: 12px;
        display: inline-block;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
</style>
